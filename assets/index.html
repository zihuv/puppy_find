<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuppyFind</title>
    <link rel="stylesheet" href="/assets/app.css">
    <script defer src="/assets/app.js"></script>
    <script defer src="/assets/vendor/alpine.min.js"></script>
</head>

<body>
    <div class="page" x-data="puppyFind()" x-init="init()">
        <header class="page-head">
            <div class="page-brand">
                <h1>PuppyFind</h1>
            </div>
            <div class="page-tools">
                <div class="head-progress">
                    <span>扫描进度</span>
                    <strong x-text="scanProgressText()"></strong>
                </div>
                <button class="primary" @click="startIndex()" :disabled="indexStatus.running || saving">
                    <span x-text="indexStatus.running ? '索引中...' : '开始建索引'"></span>
                </button>
                <button class="ghost" @click="openSettings()">配置</button>
            </div>
        </header>

        <p class="error" x-show="error" x-text="error"></p>
        <p class="error" x-show="indexError" x-text="indexError"></p>

        <div class="search-row">
            <input x-model.trim="query" @keydown.enter.prevent="search()" type="text" placeholder="输入关键词，比如：草地上的小狗">
            <button class="primary" @click="search()" :disabled="searching">
                <span>搜索</span>
            </button>
        </div>
        <section class="results" x-show="results.length">
            <template x-for="item in results" :key="item.id">
                <article class="card">
                    <img :src="item.image_url" :alt="item.file_name" loading="lazy">
                    <div class="card-body">
                        <div class="card-row">
                            <strong x-text="item.file_name"></strong>
                            <span x-text="item.score.toFixed(4)"></span>
                        </div>
                        <p class="path" x-text="item.path"></p>
                        <div class="card-actions">
                            <button class="ghost path-button" type="button" @click="openPath(item.path)">打开位置</button>
                        </div>
                    </div>
                </article>
            </template>
        </section>



        <div class="modal-backdrop" x-show="showSettings" x-transition.opacity @click="closeSettings()" x-cloak></div>
        <section class="modal" x-show="showSettings" x-transition @keydown.escape.window="closeSettings()" x-cloak>
            <div class="modal-card">
                <div class="section-head modal-head">
                    <h2>配置</h2>
                    <button class="icon-button" @click="closeSettings()">关闭</button>
                </div>

                <label class="field">
                    <span>MODEL_PATH</span>
                    <div class="path-input-row">
                        <input x-model.trim="form.model_path" type="text" placeholder="./config/model">
                        <button class="ghost path-button" type="button" @click="chooseDirectory('model_path')">选择目录</button>
                    </div>
                </label>

                <label class="field">
                    <span>素材目录</span>
                    <div class="path-input-row">
                        <input x-model.trim="form.asset_dir" type="text">
                        <button class="ghost path-button" type="button" @click="chooseDirectory('asset_dir')">选择目录</button>
                    </div>
                </label>

                <section class="runtime-summary" x-show="runtimeDeviceText()">
                    <div class="runtime-summary-row">
                        <span>推理设备</span>
                        <strong x-text="runtimeDeviceText()"></strong>
                    </div>
                </section>

                <div class="actions">
                    <button @click="saveSettings()" :disabled="saving || indexStatus.running">
                        <span x-text="saving ? '保存中...' : '保存配置'"></span>
                    </button>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
